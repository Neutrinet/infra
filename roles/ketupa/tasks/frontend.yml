---

- name: Configuration du site (caddy, php-fpm, etc.)
  ansible.builtin.import_role:
    name: web_app
  vars:
    web_app_domain: "{{ ketupa_app_domain }}"
    web_app_create_user: "{{ ketupa_app_create_user }}"
    web_app_owner: "{{ ketupa_app_owner }}"
    web_app_group: "{{ ketupa_app_group }}"
    web_app_www_dir: "{{ ketupa_app_www_dir }}"
    web_app_home_dir: "{{ ketupa_app_www_dir }}"
    web_app_dist_dir: "{{ ketupa_app_dist_dir }}"
    web_app_caddy_log: "{{ ketupa_app_caddy_log }}"
    web_app_caddy_template: caddy/Caddyfile.j2
    web_app_php_fpm_enabled: true
  tags: ['web_app']
