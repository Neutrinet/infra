
- name: Test si la swap existe
  ansible.builtin.stat:
    path: /swapfile
  register: swapfile

- name: Créer le fichier swap
  ansible.builtin.command:
    cmd: "fallocate -l {{ '1GB' | human_to_bytes }} /swapfile"
    creates: /swapfile
  when: not swapfile.stat.exists

- name: Definir les permissions
  ansible.builtin.file:
    path: /swapfile
    owner: root
    group: root
    mode: 'u=rw,go='

- name: Formater le fichier
  community.general.filesystem:
    fstype: swap
    dev: /swapfile
  when: not swapfile.stat.exists

- name: Mount swap partition
  ansible.posix.mount:
    path: none
    src: /swapfile
    fstype: swap
    opts: sw
    state: present

- name: Activer la swap
  ansible.builtin.command:
    cmd: "/usr/sbin/swapon -a"
